---
- name: Personal Arch setup (tiny + AUR/Flatpak) with hardware/distro detection
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  collections:
    - community.general
    - kewlfft.aur

  vars:
    pacman_packages:
      - git
      - github-cli
      - chezmoi
      - curl
      - wget
      - zsh
      - neovim
      - ripgrep
      - fd
      - zip
      - unzip
      - unrar
      - fastfetch
      - openssh
      - firewalld
      - flatpak
      - man-db
      - man-pages
      - rsync
      - pacman-contrib
      - ntfs-3g
      - networkmanager
      - brightnessctl

      # --- Audio ---
      - pipewire
      - pipewire-alsa
      - pipewire-pulse
      - pipewire-jack
      - wireplumber
      - alsa-utils

      # --- Bluetooth ---
      - bluez
      - bluez-utils
      - blueman

      # --- Fonts ---
      - noto-fonts
      - noto-fonts-cjk
      - noto-fonts-emoji
      - noto-fonts-extra

      # --- Hyprland Core ---
      - hyprland
      - wayland
      - wayland-protocols
      - xdg-desktop-portal
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - hyprpaper
      - mako
      - gtk3
      - qt5-wayland
      - qt6-wayland
      - grim
      - slurp
      - wl-clipboard
      - waybar
      - xorg-xwayland

      # --- Power Management ---
      - swaylock
      - swayidle

      # --- Login Manager (Wayland) ---
      - greetd
      - greetd-tuigreet

      # --- UX & Networking ---
      - network-manager-applet
      - nm-connection-editor
      - pavucontrol

      # --- Ecosystem ---
      - foot
      - firefox
      - thunar
      - gvfs
      - polkit-gnome
      - polkit
      - qt5ct
      - qt6ct

    # Augmented at runtime based on detection:
    detected_packages: []
    detected_services: []

    # --- AUR/Flatpak (yours, unchanged) ---
    aur_packages:
      - rofi-wayland
      - nwg-look
      - wlogout

    flatpak_apps:
      - com.discordapp.Discord

    services:
      - NetworkManager
      - firewalld
      - bluetooth
      # - sshd

  pre_tasks:
    - name: Ensure base-devel, reflector, and tools for detection are present
      community.general.pacman:
        name:
          - base-devel
          - reflector
          - pciutils        # lspci
          - dmidecode       # hardware/filter helpers
          - bash            # for sourcing /etc/os-release
        state: present
        update_cache: true

    - name: Upgrade system packages
      community.general.pacman:
        update_cache: true
        upgrade: true

    - name: Detect distro ID from /etc/os-release
      ansible.builtin.command: bash -lc "source /etc/os-release && echo -n ${ID:-arch}"
      register: os_release_id
      changed_when: false

    - name: Normalize distro fact
      ansible.builtin.set_fact:
        distro_id: "{{ (os_release_id.stdout | lower) | default('arch') }}"

    - name: Detect CPU vendor (Intel/AMD)
      ansible.builtin.set_fact:
        cpu_vendor: >-
          {% if (ansible_facts['processor'] | join(' ') | lower) is search('intel') %}
          intel
          {% elif (ansible_facts['processor'] | join(' ') | lower) is search('amd') %}
          amd
          {% else %}
          unknown
          {% endif %}

    - name: Detect GPU vendor via lspci
      ansible.builtin.shell: "lspci -nnk | grep -Ei 'vga|3d|display' || true"
      register: lspci_gpus
      changed_when: false

    - name: Normalize GPU vendor
      ansible.builtin.set_fact:
        gpu_vendor: >-
          {% set l = (lspci_gpus.stdout | lower) %}
          {% if 'nvidia' in l %}nvidia{% elif 'amd' in l or 'ati' in l %}amd{% elif 'intel' in l %}intel{% else %}unknown{% endif %}

    - name: Detect if this is a laptop (battery present)
      ansible.builtin.stat:
        path: /sys/class/power_supply/BAT0
      register: bat0

    # ----------------------
    # Build dynamic packages
    # ----------------------
    - name: Add CPU microcode package
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['intel-ucode'] }}"
      when: cpu_vendor == 'intel'

    - name: Add CPU microcode package (AMD)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['amd-ucode'] }}"
      when: cpu_vendor == 'amd'

    - name: Add GPU stack (NVIDIA)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['nvidia-dkms','nvidia-utils','vulkan-icd-loader'] }}"
      when: gpu_vendor == 'nvidia'

    - name: Add GPU stack (AMD)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['mesa','mesa-utils','libva-mesa-driver','vulkan-radeon','vulkan-tools'] }}"
      when: gpu_vendor == 'amd'

    - name: Add GPU stack (Intel)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['mesa','mesa-utils','intel-media-driver','vulkan-intel','vulkan-tools'] }}"
      when: gpu_vendor == 'intel'

    - name: Add laptop power management (tlp) when battery exists
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['tlp','tlp-rdw','acpi_call'] }}"
        detected_services: "{{ detected_services + ['tlp'] }}"
      when: bat0.stat.exists

    # ---------------------------------------
    # Distro-specific sets (installed if real)
    # ---------------------------------------
    - name: Seed list of distro-specific packages
      ansible.builtin.set_fact:
        distro_packages: >
          {{
            ['linux-cachyos','linux-cachyos-headers','cachyos-settings','rate-mirrors']
            if distro_id == 'cachyos'
            else
            ['eos-hooks','eos-update-notifier','reflector-simple','akm']
            if distro_id in ['endeavouros', 'endeavour']
            else
            []
          }}

    - name: Create empty list to collect available distro packages
      ansible.builtin.set_fact:
        filtered_distro_packages: []

    - name: Keep only packages that actually exist on this system (safe install)
      ansible.builtin.shell: "pacman -Si {{ item }} >/dev/null 2>&1"
      loop: "{{ distro_packages }}"
      register: pkg_checks
      failed_when: false
      changed_when: false

    - name: Accumulate only available distro packages
      ansible.builtin.set_fact:
        filtered_distro_packages: "{{ filtered_distro_packages + [ item.item ] }}"
      loop: "{{ pkg_checks.results }}"
      when: item.rc == 0

    - name: Merge detected and filtered distro packages
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + filtered_distro_packages }}"

    # ----------------------
    # Optimization: linux-zen + zram + power + earlyoom
    # ----------------------
    - name: Add linux-zen and optimization tools to package plan
      ansible.builtin.set_fact:
        detected_packages: >-
          {{ detected_packages
             + ['linux-zen','linux-zen-headers','systemd-zram-generator','earlyoom'] }}

    - name: Add auto-cpufreq on laptops (ONLY if TLP is not used)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['auto-cpufreq'] }}"
        detected_services: "{{ detected_services + ['auto-cpufreq'] }}"
      when: bat0.stat.exists and 'tlp' not in detected_packages

    - name: Register optimization services (EarlyOOM + power-profiles)
      ansible.builtin.set_fact:
        detected_services: "{{ (detected_services + ['earlyoom']) | unique }}"

    - name: Add power-profiles-daemon (if NOT using TLP)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['power-profiles-daemon'] }}"
        detected_services: "{{ detected_services + ['power-profiles-daemon'] }}"
      when: "'tlp' not in detected_packages"

  tasks:
    - name: Refresh pacman mirrors with reflector (Arch family)
      ansible.builtin.command: >
        reflector --latest 20 --sort rate --save /etc/pacman.d/mirrorlist
      register: reflector_run
      changed_when: reflector_run.rc == 0

    - name: Allow AUR builder to run pacman without password
      become: true
      copy:
        dest: /etc/sudoers.d/11-aur
        content: |
          {{ ansible_user_id }} ALL=(ALL) NOPASSWD: /usr/bin/pacman
        mode: '0440'

    - name: Install repo packages (base + detected)
      community.general.pacman:
        name: "{{ pacman_packages + detected_packages }}"
        state: present

    - name: Install yay (bootstrap with makepkg if missing)
      become: false
      kewlfft.aur.aur:
        use: makepkg
        name: yay
        state: present

    - name: Install AUR packages with yay
      become: false
      kewlfft.aur.aur:
        use: yay
        name: "{{ aur_packages | default([]) }}"
        state: present
      when: (aur_packages | default([])) | length > 0

    - name: Ensure Flathub remote (system-wide)
      community.general.flatpak_remote:
        name: flathub
        state: present
        method: system
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak apps (system-wide)
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        method: system
      loop: "{{ flatpak_apps | default([]) }}"

    - name: Change default shell to Zsh for the ansible user
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh
      become: true

    - name: Ensure wallpaper directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/Pictures/wallpapers"
        state: directory
        mode: '0755'
      become: false

    - name: Get wallpaper list from GitHub API
      ansible.builtin.uri:
        url: https://api.github.com/repos/NightmaresOfTheEnd/tarchy/contents/files/wallpaper
        return_content: true
      register: api_response
      become: false

    - name: Download all wallpapers from the list
      ansible.builtin.get_url:
        url: "{{ item.download_url }}"
        dest: "{{ lookup('env', 'HOME') }}/Pictures/wallpapers/{{ item.name }}"
        mode: '0644'
      loop: "{{ api_response.json }}"
      when: item.type == 'file'
      become: false

    - name: Clone Oh My Zsh repository
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh"
        depth: 1
        version: main
        single_branch: yes
      become: false
      tags: [oh-my-zsh, dotfiles]

    - name: Check if dotfiles are already managed by chezmoi
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.local/share/chezmoi"
      register: chezmoi_dir
      become: false
      tags: [dotfiles]

    - name: Initialize and apply dotfiles with chezmoi (if new)
      ansible.builtin.command:
        cmd: "chezmoi init --apply https://github.com/NightmaresOfTheEnd/dotfiles.git"
        chdir: "{{ lookup('env', 'HOME') }}"
      become: false
      when: not chezmoi_dir.stat.exists
      tags: [dotfiles]

    - name: Update dotfiles with chezmoi (if existing)
      ansible.builtin.command:
        cmd: "chezmoi update -v"
        chdir: "{{ lookup('env', 'HOME') }}"
      become: false
      when: chezmoi_dir.stat.exists
      register: chezmoi_update
      changed_when: "'applied' in chezmoi_update.stdout"
      tags: [dotfiles]

    # --- ZRAM config (ram/2, zstd). Handler starts the swap unit.
    - name: Configure ZRAM generator
      ansible.builtin.copy:
        dest: /etc/systemd/zram-generator.conf
        mode: '0644'
        content: |
          [zram0]
          zram-size = ram / 2
          compression-algorithm = zstd
      notify: Restart zram

    # --- I/O scheduler rules: mq-deadline (NVMe) / bfq (SATA/HDD)
    - name: Set I/O scheduler defaults
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/60-iosched.rules
        mode: '0644'
        content: |
          ACTION=="add|change", KERNEL=="nvme*", ATTR{queue/scheduler}="mq-deadline"
          ACTION=="add|change", KERNEL=="sd[a-z]*", ATTR{queue/scheduler}="bfq"
      notify: Reload udev

    # --- TCP BBR for better latency/throughput
    - name: Enable TCP BBR
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-bbr.conf
        mode: '0644'
        content: |
          net.ipv4.tcp_congestion_control = bbr
          net.core.default_qdisc = fq
      notify: Apply sysctl

    # -----------------------------------------------------
    # Enable baseline services + any hardware-detected services (e.g., tlp)
    - name: Enable & start services
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop: "{{ services + detected_services | unique }}"

    - name: Configure greetd (Hyprland session)
      ansible.builtin.copy:
        dest: /etc/greetd/config.toml
        mode: '0644'
        content: |
          [terminal]
          vt = 1

          [default_session]
          command = "tuigreet --time --remember --cmd Hyprland"
          user = "greeter"

    - name: Enable greetd
      ansible.builtin.service:
        name: greetd
        enabled: true
        state: started

    - name: Display completion summary
      ansible.builtin.debug:
        msg: >
          Setup complete! Distro={{ distro_id }}, CPU={{ cpu_vendor }}, GPU={{ gpu_vendor }},
          Laptop={{ bat0.stat.exists | ternary('yes','no') }}.
          Installed {{ (pacman_packages + detected_packages) | length }} repo packages,
          {{ aur_packages | default([]) | length }} AUR packages,
          and {{ flatpak_apps | default([]) | length }} Flatpak apps.

  handlers:
    - name: Restart zram
      ansible.builtin.systemd:
        daemon_reload: true
        name: dev-zram0.swap
        enabled: true
        state: restarted

    - name: Reload udev
      ansible.builtin.command: udevadm control --reload
    - name: Trigger udev
      ansible.builtin.command: udevadm trigger --subsystem-match=block

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system

