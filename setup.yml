- name: Personal Arch setup (tiny + AUR/Flatpak)
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  collections:
    - community.general
    - kewlfft.aur

  vars:
    pacman_packages:
      - git
      - github-cli
      - chezmoi
      - curl
      - wget
      - zsh
      - neovim
      - ripgrep
      - fd
      - zip
      - unzip
      - unrar
      - fastfetch
      - openssh
      - firewalld
      - flatpak
      - sudo
      - man-db
      - man-pages
      - rsync
      - pacman-contrib
      - ntfs-3g
      - networkmanager
      - brightnessctl

      # --- Audio ---
      - pipewire
      - pipewire-alsa
      - pipewire-pulse
      - pipewire-jack
      - wireplumber
      - alsa-utils

      # --- Bluetooth ---
      - bluez
      - bluez-utils
      - blueman

      # --- Fonts ---
      - noto-fonts
      - noto-fonts-cjk
      - noto-fonts-emoji
      - noto-fonts-extra

      # --- Hyprland Core ---
      - hyprland
      - wayland
      - wayland-protocols
      - xdg-desktop-portal
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - xdg-desktop-portal-wlr
      - hyprpaper
      - mako # Notification daemon (simple, Wayland-native)
      # - dunst # Notification daemon (powerful, scriptable)
      - gtk3
      - qt5-wayland
      - qt6-wayland
      - grim
      - slurp
      - wl-clipboard
      - waybar
      - xorg-xwayland
        
      # --- Power Management ---
      - swaylock
      - swayidle

      # --- Login Manager (Wayland) ---
      - greetd
      - greetd-tuigreet

      # --- UX & Networking ---
      - network-manager-applet
      - nm-connection-editor
      - pavucontrol # simple audio mixer

      # --- Ecosystem ---
      - foot # Terminal
      - firefox
      - thunar # Lightweight GTK file manager
      - gvfs # Backend for Thunar (trash, mounting, etc.)
      - polkit-gnome          # provides polkit-gnome-authentication-agent-1
      - polkit
      - qt5ct
      - qt6ct

    aur_packages:        # edit to taste (leave as [] to avoid null)
      - rofi-wayland
      - nwg-look
      - wlogout

    flatpak_apps:           # optional
      - com.discordapp.Discord

    services:
      - NetworkManager
      - firewalld
      - bluetooth
      # - sshd            # uncomment if you actually want SSH enabled

  pre_tasks:
    - name: Ensure base-devel and reflector present (for builds/mirror mgmt)
      community.general.pacman:
        name:
          - base-devel
          - reflector
        state: present
        update_cache: true

    - name: Upgrade system packages
      community.general.pacman:
        update_cache: true
        upgrade: true

  tasks:
    - name: Refresh pacman mirrors with reflector
    ansible.builtin.command: >
      reflector --latest 20 --sort rate --save /etc/pacman.d/mirrorlist
    register: reflector_run
    changed_when: reflector_run.rc == 0
    when: ansible_facts['os_family'] == 'Archlinux'

    - name: Allow AUR builder to run pacman without password
      become: true
      copy:
        dest: /etc/sudoers.d/11-aur
        content: |
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman
        mode: '0440'

    - name: Install repo packages
      community.general.pacman:
        name: "{{ pacman_packages }}"
        state: present

    - name: Install yay (bootstrap with makepkg if missing)
      become: false
      kewlfft.aur.aur:
        use: makepkg
        name: yay
        state: present

    - name: Install AUR packages with yay
      become: false
      kewlfft.aur.aur:
        use: yay
        name: "{{ aur_packages | default([]) }}"
        state: present
      when: (aur_packages | default([])) | length > 0

    - name: Ensure Flathub remote (system-wide)
      community.general.flatpak_remote:
        name: flathub
        state: present
        method: system
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak apps (system-wide)
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        method: system
      loop: "{{ flatpak_apps | default([]) }}"
      
    - name: Change default shell to Zsh for the ansible user
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh
      become: true

    - name: Ensure wallpaper directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/Pictures/wallpapers"
        state: directory
        mode: '0755'
      become: false

    - name: Clone tarchy repo to a temp location
      ansible.builtin.git:
        repo: https://github.com/NightmaresOfTheEnd/tarchy.git
        dest: /tmp/tarchy
        depth: 1         # Faster clone, no history
        version: main
        single_branch: yes
      become: false

    - name: Copy *only* the wallpaper files to destination
      ansible.builtin.copy:
        src: /tmp/tarchy/files/wallpaper/  # Note the trailing /
        dest: "{{ lookup('env', 'HOME') }}/Pictures/wallpapers/"
        remote_src: true  # This is a remote-to-remote copy
      become: false

    - name: Clean up temporary repo clone
      ansible.builtin.file:
        path: /tmp/tarchy
        state: absent
      become: false

    - name: Clone Oh My Zsh repository
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh"
        depth: 1               # Faster clone, no history
        version: main
        single_branch: yes
      become: false            # This must be run as your user
      tags:
        - oh-my-zsh
        - dotfiles

    - name: Check if dotfiles are already managed by chezmoi
      ansible.builtin.stat:
        path: "{{ lookup('env', 'HOME') }}/.local/share/chezmoi"
      register: chezmoi_dir
      become: false
      tags: dotfiles  # <-- Add this tag

    - name: Initialize and apply dotfiles with chezmoi (if new)
      ansible.builtin.command:
        cmd: "chezmoi init --apply https://github.com/NightmaresOfTheEnd/dotfiles.git"
        chdir: "{{ lookup('env', 'HOME') }}"
      become: false
      when: not chezmoi_dir.stat.exists  # Only run if not initialized
      tags: dotfiles

    - name: Update dotfiles with chezmoi (if existing)
      ansible.builtin.command:
        cmd: "chezmoi update -v"
        chdir: "{{ lookup('env', 'HOME') }}"
      become: false
      when: chezmoi_dir.stat.exists   # Only run if already initialized
      register: chezmoi_update
      changed_when: "'applied' in chezmoi_update.stdout"
      tags: dotfiles

    - name: Enable & start services
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop: "{{ services }}"

    - name: Configure greetd (Hyprland session)
      ansible.builtin.copy:
        dest: /etc/greetd/config.toml
        mode: '0644'
        content: |
          [terminal]
          vt = 1

          [default_session]
          command = "tuigreet --time --remember --cmd Hyprland"
          user = "greeter"

    - name: Enable greetd
      ansible.builtin.service:
        name: greetd
        enabled: true
        state: started

    - name: Display completion summary
      ansible.builtin.debug:
        msg: >
          Setup complete! Installed {{ pacman_packages | length }} repo packages,
          {{ aur_packages | default([]) | length }} AUR packages, and
          {{ flatpak_apps | default([]) | length }} Flatpak apps.
