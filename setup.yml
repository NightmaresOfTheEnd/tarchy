---
- name: Personal Arch setup (tiny + AUR/Flatpak) with hardware/distro detection
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  collections:
    - community.general
    - kewlfft.aur

  vars:
    # Target user - defaults to current user, override with -e ansible_user=username
    ansible_user: "{{ lookup('env', 'USER') }}"

    # Dotfiles repository - override with -e dotfiles_repo=https://github.com/user/dotfiles.git
    dotfiles_repo: "https://github.com/NightmaresOfTheEnd/dotfiles.git"

    pacman_packages:
      - git
      - github-cli
      - chezmoi
      - curl
      - wget
      - zsh
      - neovim
      - ripgrep
      - fd
      - zip
      - unzip
      - unrar
      - fastfetch
      - ufw
      - flatpak
      - man-db
      - man-pages
      - rsync
      - pacman-contrib
      - ntfs-3g
      - networkmanager
      - brightnessctl
      - linux-firmware
      - fwupd

      # --- Audio ---
      - pipewire
      - pipewire-alsa
      - pipewire-pulse
      - pipewire-jack
      - wireplumber
      - alsa-utils

      # --- Bluetooth ---
      - bluez
      - bluez-utils
      - blueman

      # --- Fonts ---
      - noto-fonts
      - noto-fonts-cjk
      - noto-fonts-emoji
      - noto-fonts-extra
      - ttf-jetbrains-mono
      - ttf-font-awesome

      # --- Hyprland Core ---
      - hyprland
      - wayland
      - wayland-protocols
      - xdg-desktop-portal
      - xdg-desktop-portal-hyprland
      - xdg-desktop-portal-gtk
      - hyprpaper
      - mako
      - gtk3
      - qt5-wayland
      - qt6-wayland
      - grim
      - slurp
      - wl-clipboard
      - waybar
      - xorg-xwayland

      # --- Power Management (Hyprland native) ---
      - hypridle
      - hyprlock
      - hyprpicker
      - libnotify

      # --- Login Manager (Wayland) ---
      - greetd
      - greetd-tuigreet

      # --- UX & Networking ---
      - network-manager-applet
      - nm-connection-editor
      - pavucontrol

      # --- Ecosystem ---
      - foot
      - firefox
      - thunar
      - gvfs
      - polkit-gnome
      - polkit
      - qt5ct
      - qt6ct

      # --- Quality of Life ---
      - xdg-user-dirs
      - btop
      - imv
      - upower

      # --- Theming & Pywal ---
      - imagemagick
      - python-pillow
      - jq
      - papirus-icon-theme

      # --- Media & Utilities ---
      - playerctl
      - xdg-utils
      - ttf-nerd-fonts-symbols

    # Augmented at runtime based on detection:
    detected_packages: []
    detected_services: []

    # Laptop power management: 'tlp' (comprehensive) or 'auto-cpufreq' (simpler, auto-tuning)
    laptop_power_manager: tlp

    # --- AUR/Flatpak ---
    aur_packages:
      - rofi-wayland
      - nwg-look
      - wlogout
      - python-pywal
      - bibata-cursor-theme

    flatpak_apps:
      - com.discordapp.Discord

    services:
      - NetworkManager
      - ufw
      - bluetooth

  pre_tasks:
    - name: Ensure base-devel, reflector, and tools for detection are present
      community.general.pacman:
        name:
          - base-devel
          - reflector
          - pciutils # lspci
          - dmidecode # hardware/filter helpers
          - bash # for sourcing /etc/os-release
        state: present
        update_cache: true

    - name: Upgrade system packages
      community.general.pacman:
        update_cache: true
        upgrade: true

    - name: Detect distro ID from /etc/os-release
      ansible.builtin.command: bash -lc "source /etc/os-release && echo -n ${ID:-arch}"
      register: os_release_id
      changed_when: false

    - name: Normalize distro fact
      ansible.builtin.set_fact:
        distro_id: "{{ (os_release_id.stdout | lower) | default('arch') }}"

    - name: Detect CPU vendor (Intel/AMD)
      ansible.builtin.set_fact:
        cpu_vendor: >-
          {% if (ansible_facts['processor'] | join(' ') | lower) is search('intel') %}
          intel
          {% elif (ansible_facts['processor'] | join(' ') | lower) is search('amd') %}
          amd
          {% else %}
          unknown
          {% endif %}

    - name: Detect GPU vendor via lspci
      ansible.builtin.shell: "lspci -nnk | grep -Ei 'vga|3d|display' || true"
      register: lspci_gpus
      changed_when: false

    - name: Detect all GPU vendors (supports hybrid setups)
      ansible.builtin.set_fact:
        gpu_vendors: >-
          {% set l = (lspci_gpus.stdout | lower) %}
          {% set vendors = [] %}
          {% if 'nvidia' in l %}{% set _ = vendors.append('nvidia') %}{% endif %}
          {% if 'amd' in l or 'ati' in l %}{% set _ = vendors.append('amd') %}{% endif %}
          {% if 'intel' in l %}{% set _ = vendors.append('intel') %}{% endif %}
          {{ vendors if vendors else ['unknown'] }}

    - name: Detect if this is a laptop (any battery present)
      ansible.builtin.find:
        paths: /sys/class/power_supply/
        patterns: "BAT*,battery,BATT"
        file_type: directory
      register: laptop_batteries

    # ----------------------
    # Build dynamic packages
    # ----------------------
    - name: Add CPU microcode package
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['intel-ucode'] }}"
      when: cpu_vendor == 'intel'

    - name: Add CPU microcode package (AMD)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['amd-ucode'] }}"
      when: cpu_vendor == 'amd'

    - name: Add GPU stack (NVIDIA)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['nvidia-dkms','nvidia-utils','nvidia-settings','lib32-nvidia-utils','vulkan-icd-loader'] }}"
      when: "'nvidia' in gpu_vendors"

    - name: Add GPU stack (AMD)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['mesa','mesa-utils','libva-mesa-driver','vulkan-radeon','vulkan-tools'] }}"
      when: "'amd' in gpu_vendors"

    - name: Add GPU stack (Intel)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['mesa','mesa-utils','intel-media-driver','vulkan-intel','vulkan-tools'] }}"
      when: "'intel' in gpu_vendors"

    - name: Add laptop power management (TLP) when battery exists
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['tlp','tlp-rdw','acpi_call'] }}"
        detected_services: "{{ detected_services + ['tlp'] }}"
      when: laptop_batteries.matched > 0 and laptop_power_manager == 'tlp'

    - name: Add laptop power management (auto-cpufreq) when battery exists
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['auto-cpufreq'] }}"
        detected_services: "{{ detected_services + ['auto-cpufreq'] }}"
      when: laptop_batteries.matched > 0 and laptop_power_manager == 'auto-cpufreq'

    # ---------------------------------------
    # Distro-specific sets (installed if real)
    # ---------------------------------------
    - name: Seed list of distro-specific packages
      ansible.builtin.set_fact:
        distro_packages: >
          {{
            ['linux-cachyos','linux-cachyos-headers','cachyos-settings','rate-mirrors']
            if distro_id == 'cachyos'
            else
            ['eos-hooks','eos-update-notifier','reflector-simple','akm']
            if distro_id in ['endeavouros', 'endeavour']
            else
            []
          }}

    - name: Create empty list to collect available distro packages
      ansible.builtin.set_fact:
        filtered_distro_packages: []

    - name: Keep only packages that actually exist on this system (safe install)
      ansible.builtin.shell: "pacman -Si {{ item }} >/dev/null 2>&1"
      loop: "{{ distro_packages }}"
      register: pkg_checks
      failed_when: false
      changed_when: false

    - name: Accumulate only available distro packages
      ansible.builtin.set_fact:
        filtered_distro_packages: "{{ filtered_distro_packages + [ item.item ] }}"
      loop: "{{ pkg_checks.results }}"
      when: item.rc == 0

    - name: Merge detected and filtered distro packages
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + filtered_distro_packages }}"

    # ----------------------
    # Optimization: linux-zen + zram + power + earlyoom
    # ----------------------
    - name: Add linux-zen and optimization tools to package plan
      ansible.builtin.set_fact:
        detected_packages: >-
          {{ detected_packages
             + ['linux-zen','linux-zen-headers','zram-generator','earlyoom'] }}

    - name: Register optimization services (EarlyOOM)
      ansible.builtin.set_fact:
        detected_services: "{{ (detected_services + ['earlyoom']) | unique }}"

    - name: Add power-profiles-daemon (desktops or non-TLP laptops)
      ansible.builtin.set_fact:
        detected_packages: "{{ detected_packages + ['power-profiles-daemon'] }}"
        detected_services: "{{ detected_services + ['power-profiles-daemon'] }}"
      when: laptop_batteries.matched == 0 or laptop_power_manager != 'tlp'

  tasks:
    - name: Refresh pacman mirrors with reflector (Arch family)
      ansible.builtin.command: >
        reflector --latest 20 --sort rate --save /etc/pacman.d/mirrorlist
      changed_when: false

    - name: Validate ansible_user exists on system
      ansible.builtin.getent:
        database: passwd
        key: "{{ ansible_user }}"
      register: user_check
      failed_when: user_check.ansible_facts.getent_passwd[ansible_user] is not defined

    - name: Allow AUR builder to run pacman sync operations without password
      become: true
      ansible.builtin.copy:
        dest: /etc/sudoers.d/11-aur
        # Restrict to specific pacman operations needed for AUR builds
        # -S (sync), -U (upgrade local pkg), -R (remove) with common flags
        content: |
          # Temporary AUR build permissions - created by tarchy playbook
          # Consider removing after initial setup if security is a concern
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -S *
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -Sy *
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -Syu *
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -U *
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -R *
          {{ ansible_user }} ALL=(ALL) NOPASSWD: /usr/bin/pacman -Rs *
        mode: "0440"
        validate: "visudo -cf %s"

    - name: Install repo packages (base + detected)
      community.general.pacman:
        name: "{{ pacman_packages + detected_packages }}"
        state: present

    - name: Install yay (bootstrap with makepkg if missing)
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      kewlfft.aur.aur:
        use: makepkg
        name: yay
        state: present
      retries: 3
      delay: 10
      timeout: 600
      register: yay_install
      until: yay_install is succeeded

    - name: Install AUR packages with yay
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      kewlfft.aur.aur:
        use: yay
        name: "{{ aur_packages | default([]) }}"
        state: present
      retries: 3
      delay: 10
      timeout: 600
      register: aur_install
      until: aur_install is succeeded
      when: (aur_packages | default([])) | length > 0

    - name: Ensure Flathub remote (system-wide)
      community.general.flatpak_remote:
        name: flathub
        state: present
        method: system
        flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

    - name: Install Flatpak apps (system-wide)
      community.general.flatpak:
        name: "{{ item }}"
        state: present
        method: system
      loop: "{{ flatpak_apps | default([]) }}"

    - name: Change default shell to Zsh for the ansible user
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh
      become: true

    - name: Ensure wallpaper directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/Pictures/wallpapers"
        state: directory
        mode: "0755"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
      become: true

    - name: Get wallpaper list from GitHub API
      ansible.builtin.uri:
        url: https://api.github.com/repos/NightmaresOfTheEnd/tarchy/contents/files/wallpaper
        return_content: true
        timeout: 30
      register: api_response
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      retries: 3
      delay: 5
      until: api_response.status == 200

    - name: Download all wallpapers from the list
      ansible.builtin.get_url:
        url: "{{ item.download_url }}"
        dest: "/home/{{ ansible_user }}/Pictures/wallpapers/{{ item.name }}"
        mode: "0644"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        timeout: 60
      loop: "{{ api_response.json }}"
      when: item.type == 'file'
      become: true
      retries: 3
      delay: 5

    - name: Clone Oh My Zsh repository
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "/home/{{ ansible_user }}/.oh-my-zsh"
        depth: 1
        version: master
        single_branch: yes
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      retries: 3
      delay: 5

    - name: Install zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions.git
        dest: "/home/{{ ansible_user }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"
        depth: 1
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      retries: 3
      delay: 5

    - name: Install zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "/home/{{ ansible_user }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        depth: 1
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      retries: 3
      delay: 5

    - name: Check if dotfiles are already managed by chezmoi
      ansible.builtin.stat:
        path: "/home/{{ ansible_user }}/.local/share/chezmoi"
      register: chezmoi_dir
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      tags: [dotfiles]

    - name: Initialize and apply dotfiles with chezmoi (if new)
      ansible.builtin.command:
        cmd: "chezmoi init --apply {{ dotfiles_repo }}"
        chdir: "/home/{{ ansible_user }}"
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      when: not chezmoi_dir.stat.exists
      tags: [dotfiles]

    - name: Update dotfiles with chezmoi (if existing)
      ansible.builtin.command:
        cmd: "chezmoi update -v"
        chdir: "/home/{{ ansible_user }}"
      become: true
      become_user: "{{ ansible_user }}"
      become_method: su
      when: chezmoi_dir.stat.exists
      register: chezmoi_update
      changed_when: "'applied' in chezmoi_update.stdout"
      tags: [dotfiles]

    # --- ZRAM config (ram/2, zstd). Handler starts the swap unit.
    - name: Configure ZRAM generator
      ansible.builtin.copy:
        dest: /etc/systemd/zram-generator.conf
        mode: "0644"
        content: |
          [zram0]
          zram-size = ram / 2
          compression-algorithm = zstd
      notify: Restart zram

    # --- I/O scheduler rules: mq-deadline (NVMe) / bfq (SATA/HDD)
    - name: Set I/O scheduler defaults
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/60-iosched.rules
        mode: "0644"
        content: |
          ACTION=="add|change", KERNEL=="nvme*", ATTR{queue/scheduler}="mq-deadline"
          ACTION=="add|change", KERNEL=="sd[a-z]*", ATTR{queue/scheduler}="bfq"
      notify: Reload udev

    # --- TCP BBR for better latency/throughput
    - name: Enable TCP BBR
      ansible.builtin.copy:
        dest: /etc/sysctl.d/90-bbr.conf
        mode: "0644"
        content: |
          net.ipv4.tcp_congestion_control = bbr
          net.core.default_qdisc = fq
      notify: Apply sysctl

    # -----------------------------------------------------
    # Enable baseline services + any hardware-detected services (e.g., tlp)
    - name: Enable & start services
      ansible.builtin.service:
        name: "{{ item }}"
        enabled: true
        state: started
      loop: "{{ services + detected_services | unique }}"

    - name: Configure greetd (Hyprland session)
      ansible.builtin.copy:
        dest: /etc/greetd/config.toml
        mode: "0644"
        content: |
          [terminal]
          vt = 1

          [default_session]
          command = "tuigreet --time --remember --cmd Hyprland"
          user = "greeter"

    - name: Enable greetd (starts on next boot to avoid interrupting playbook)
      ansible.builtin.service:
        name: greetd
        enabled: true

    - name: Display completion summary
      ansible.builtin.debug:
        msg: >
          Setup complete! Distro={{ distro_id }}, CPU={{ cpu_vendor }}, GPU={{ gpu_vendors | join('+') }},
          Laptop={{ (laptop_batteries.matched > 0) | ternary('yes','no') }}.
          Installed {{ (pacman_packages + detected_packages) | length }} repo packages,
          {{ aur_packages | default([]) | length }} AUR packages,
          and {{ flatpak_apps | default([]) | length }} Flatpak apps.

  handlers:
    - name: Restart zram
      ansible.builtin.systemd:
        daemon_reload: true
        name: dev-zram0.swap
        enabled: true
        state: restarted

    - name: Reload udev
      ansible.builtin.command: udevadm control --reload
      notify: Trigger udev

    - name: Trigger udev
      ansible.builtin.command: udevadm trigger --subsystem-match=block

    - name: Apply sysctl
      ansible.builtin.command: sysctl --system
